</head>
<body>

  View Live Dashboard
</a>
  <script>
    const pages = [
	"https://lookerstudio.google.com/reporting/ef45c8d6-fdcb-4510-8afb-967b4a1a8d25/page/p_kyi3hsi7sd",
	"https://lookerstudio.google.com/reporting/ef45c8d6-fdcb-4510-8afb-967b4a1a8d25/page/p_cm4kz5xbtd",
	"https://lookerstudio.google.com/reporting/ef45c8d6-fdcb-4510-8afb-967b4a1a8d25/page/p_66h1c8xbtd",
	"https://lookerstudio.google.com/reporting/ef45c8d6-fdcb-4510-8afb-967b4a1a8d25/page/p_codvx9xbtd",
	"https://lookerstudio.google.com/reporting/ef45c8d6-fdcb-4510-8afb-967b4a1a8d25/page/p_o2596bybtd",
	"https://lookerstudio.google.com/reporting/ef45c8d6-fdcb-4510-8afb-967b4a1a8d25/page/p_j6l1fdybtd",
    ];

    let index = 0;
    const interval = 5000; // 5 seconds

    function showNextPage() {
      document.getElementById("dashboardFrame").src = pages[index];
      index = (index + 1) % pages.length;
    }

    showNextPage(); // Show first page
    setInterval(showNextPage, interval);
  </script>
</body>
