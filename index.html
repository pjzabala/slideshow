<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .container {
      display: flex;
      padding: 1rem;
    }
    nav {
      width: 200px;
      background-color: #34495e;
      color: white;
      padding: 1rem;
    }
    main {
      flex: 1;
      padding: 1rem;
    }
    .card {
      background: white;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .dropdown {
      display: none;
      background-color: #eee;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
    }

    .dropdown-trigger {
      cursor: pointer;
      color: #2c3e50;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>DMCI PALAWAN MAINTENANCE</h1>
  </header>

  <div class="container">
    <nav>
      <p>Home</p>
      <div id="myDropdown" class="dropdown">
      <p class="dropdown-trigger" onclick="toggleDropdown()">Narra Thermal</p>
      </div>
      <p>Aborlan Bunker</p>
      <p>HS Diesel PP</p>
    </nav>
    <main>
      <div class="card">
        <h2>PALAWAN Maintenance</h2>
        <p>NARRA THERMAL.ABORLAN BUNKER.HS DIESEL</p>
      </div>
      <div class="card">
        <h2>Another Card</h2>
        <p>More content here.</p>
      </div>
    </main>
  </div>
  <script>
    function toggleDropdown() {
      const dropdown = document.getElementById('myDropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
