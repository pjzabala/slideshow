<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Slideshow</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
 <h2>Click a dashboard to open live view</h2>
  <script>
    const pages = [
	"https://lookerstudio.google.com/reporting/44997180-def9-4fa4-9637-5ff99044f125/page/zskNF?rm=minimal&interval=5",
    ];

    let index = 0;
    const interval = 5000; // 5 seconds

    function showNextPage() {
      document.getElementById("dashboardFrame").src = pages[index];
      index = (index + 1) % pages.length;
    }

    showNextPage(); // Show first page
    setInterval(showNextPage, interval);
  </script>
</body>
</html>
